<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Data - Earthquake Sequence Mining</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/2.1.8/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.css">
    <style>
        .chart-container {
            height: 280px;
            margin-bottom: 1rem;
        }
        .sidebar-section {
            height: calc(100vh - 120px);
            overflow-y: auto;
        }
        .main-section {
            height: calc(100vh - 120px);
            overflow-y: auto;
        }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
    </style>
</head>
<body class="py-3">
    <nav class="navbar navbar-dark bg-transparent">
        <div class="container">
            <a class="navbar-brand text-white fw-bold" href="index.html">
                <i class="bi bi-house-door-fill"></i> Home
            </a>
        </div>
    </nav>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="text-center text-white">
            <div class="spinner-border mb-3" role="status"></div>
            <h5>Loading all data...</h5>
            <p class="mb-0" id="loadingText">Please wait, this may take a while</p>
        </div>
    </div>

    <div class="container-fluid px-4">
        <div class="card">
            <div class="card-body p-3">
                <div class="row g-3">
                    <!-- Column 1: Charts & Stats -->
                    <div class="col-lg-4 sidebar-section">
                        <!-- Header -->
                        <div class="mb-3">
                            <h5 class="mb-1"><i class="bi bi-globe"></i> All Earthquake Data</h5>
                            <small class="text-muted">All years combined</small>
                        </div>

                        <!-- Stats Cards -->
                        <div class="card mb-2">
                            <div class="card-body p-2">
                                <h6 class="card-title small mb-2">Statistics</h6>
                                <div class="row g-2 text-center">
                                    <div class="col-6">
                                        <div class="small text-muted">Total Events</div>
                                        <div class="fs-5 fw-bold text-primary" id="statCount">-</div>
                                    </div>
                                    <div class="col-6">
                                        <div class="small text-muted">Avg Magnitude</div>
                                        <div class="fs-5 fw-bold text-success" id="statAvgMag">-</div>
                                    </div>
                                    <div class="col-6">
                                        <div class="small text-muted">Max Magnitude</div>
                                        <div class="fs-5 fw-bold text-danger" id="statMaxMag">-</div>
                                    </div>
                                    <div class="col-6">
                                        <div class="small text-muted">Min Magnitude</div>
                                        <div class="fs-5 fw-bold text-warning" id="statMinMag">-</div>
                                    </div>
                                    <div class="col-6">
                                        <div class="small text-muted">Avg Depth</div>
                                        <div class="fs-5 fw-bold text-info" id="statAvgDepth">-</div>
                                    </div>
                                    <div class="col-6">
                                        <div class="small text-muted">Years</div>
                                        <div class="fs-5 fw-bold text-secondary" id="statYears">-</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Magnitude Distribution -->
                        <div class="card mb-2">
                            <div class="card-body p-2">
                                <h6 class="card-title small mb-2">Magnitude Distribution</h6>
                                <div id="magChart" class="chart-container"></div>
                            </div>
                        </div>

                        <!-- Year Distribution -->
                        <div class="card mb-2">
                            <div class="card-body p-2">
                                <h6 class="card-title small mb-2">Events by Year</h6>
                                <div id="yearChart" class="chart-container"></div>
                            </div>
                        </div>

                        <!-- Depth Distribution -->
                        <div class="card mb-2">
                            <div class="card-body p-2">
                                <h6 class="card-title small mb-2">Depth Distribution</h6>
                                <div id="depthChart" class="chart-container"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Column 2: Data Table -->
                    <div class="col-lg-8 main-section">
                        <!-- Filter Controls -->
                        <div class="card mb-2">
                            <div class="card-body p-2">
                                <div class="row g-2 align-items-center">
                                    <div class="col-auto">
                                        <label class="small fw-bold mb-0">Filter:</label>
                                    </div>
                                    <div class="col">
                                        <input type="text" id="searchInput" class="form-control form-control-sm" placeholder="Search by place, magnitude...">
                                    </div>
                                    <div class="col-auto">
                                        <select id="magFilter" class="form-select form-select-sm">
                                            <option value="">All Magnitudes</option>
                                            <option value="0-3">M0.0 - M3.0</option>
                                            <option value="3-5">M3.0 - M5.0</option>
                                            <option value="5-7">M5.0 - M7.0</option>
                                            <option value="7+">M7.0+</option>
                                        </select>
                                    </div>
                                    <div class="col-auto">
                                        <button id="clearFilter" class="btn btn-sm btn-outline-secondary">Clear</button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Data Table -->
                        <div class="card">
                            <div class="card-body p-2">
                                <table id="dataTable" class="table table-striped table-hover table-sm" style="width:100%">
                                    <thead>
                                        <tr>
                                            <th>Time</th>
                                            <th>Place</th>
                                            <th>Magnitude</th>
                                            <th>Depth (km)</th>
                                            <th>Location</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/2.1.8/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/2.1.8/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script>
        const API_URL = 'http://127.0.0.1:8386/api';
        let allData = [];
        let filteredData = [];
        let dataTable;
        let magChart, yearChart, depthChart;

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            initCharts();
            loadAllData();
        });

        function initCharts() {
            magChart = echarts.init(document.getElementById('magChart'));
            yearChart = echarts.init(document.getElementById('yearChart'));
            depthChart = echarts.init(document.getElementById('depthChart'));
        }

        async function loadAllData() {
            try {
                const response = await fetch(`${API_URL}/all`);
                const result = await response.json();

                allData = result.data;
                filteredData = [...allData];

                updateStats(result.stats);
                updateCharts(result.data, result.stats);
                initTable(result.data);

                $('#loadingOverlay').fadeOut();
            } catch (error) {
                console.error('Error loading data:', error);
                $('#loadingText').text('Error loading data. Please make sure API server is running.');
            }
        }

        function updateStats(stats) {
            $('#statCount').text(stats.total_events.toLocaleString());
            $('#statAvgMag').text(stats.avg_mag);
            $('#statMaxMag').text(stats.max_mag);
            $('#statMinMag').text(stats.min_mag);
            $('#statAvgDepth').text(stats.avg_depth);

            // Count unique years
            const years = new Set(allData.map(d => d.time.split('/')[2]));
            $('#statYears').text(years.size);
        }

        function updateCharts(data, stats) {
            // Magnitude Chart
            const magOption = {
                tooltip: { trigger: 'item' },
                series: [{
                    type: 'pie',
                    radius: ['40%', '70%'],
                    data: [
                        { value: stats.mag_ranges['0-3'], name: 'M0.0 - M3.0' },
                        { value: stats.mag_ranges['3-5'], name: 'M3.0 - M5.0' },
                        { value: stats.mag_ranges['5-7'], name: 'M5.0 - M7.0' },
                        { value: stats.mag_ranges['7+'], name: 'M7.0+' }
                    ]
                }]
            };
            magChart.setOption(magOption);

            // Year Chart
            const yearCounts = {};
            data.forEach(d => {
                const year = d.time.split('/')[2];
                yearCounts[year] = (yearCounts[year] || 0) + 1;
            });

            const sortedYears = Object.keys(yearCounts).sort();
            const yearOption = {
                tooltip: { trigger: 'axis' },
                xAxis: { type: 'category', data: sortedYears },
                yAxis: { type: 'value' },
                series: [{
                    type: 'bar',
                    data: sortedYears.map(y => yearCounts[y]),
                    itemStyle: { color: '#3b82f6' }
                }]
            };
            yearChart.setOption(yearOption);

            // Depth Chart
            const depthRanges = { '0-50km': 0, '50-100km': 0, '100-300km': 0, '300km+': 0 };
            data.forEach(d => {
                const depth = d.depth;
                if (typeof depth === 'number') {
                    if (depth < 50) depthRanges['0-50km']++;
                    else if (depth < 100) depthRanges['50-100km']++;
                    else if (depth < 300) depthRanges['100-300km']++;
                    else depthRanges['300km+']++;
                }
            });

            const depthOption = {
                tooltip: { trigger: 'item' },
                series: [{
                    type: 'pie',
                    radius: ['40%', '70%'],
                    data: [
                        { value: depthRanges['0-50km'], name: '0-50km' },
                        { value: depthRanges['50-100km'], name: '50-100km' },
                        { value: depthRanges['100-300km'], name: '100-300km' },
                        { value: depthRanges['300km+'], name: '300km+' }
                    ]
                }]
            };
            depthChart.setOption(depthOption);
        }

        function initTable(data) {
            dataTable = $('#dataTable').DataTable({
                data: data,
                columns: [
                    { data: 'time' },
                    { data: 'place' },
                    {
                        data: 'mag',
                        render: function(data) {
                            if (data === '--') return '<span class="text-muted">--</span>';
                            const cls = data < 3 ? 'text-success' : data < 5 ? 'text-info' : data < 7 ? 'text-warning' : 'text-danger';
                            return `<span class="fw-bold ${cls}">${data}</span>`;
                        }
                    },
                    { data: 'depth' },
                    {
                        data: null,
                        render: function(data) {
                            if (data.lat === '--' || data.lon === '--') return '--';
                            return `${data.lat.toFixed(2)}, ${data.lon.toFixed(2)}`;
                        }
                    }
                ],
                order: [[0, 'desc']],
                pageLength: 100,
                lengthMenu: [[50, 100, 500, 1000], [50, 100, 500, 1000]]
            });
        }

        // Filters
        $('#searchInput').on('keyup', function() {
            applyFilters();
        });

        $('#magFilter').on('change', function() {
            applyFilters();
        });

        $('#clearFilter').on('click', function() {
            $('#searchInput').val('');
            $('#magFilter').val('');
            applyFilters();
        });

        function applyFilters() {
            const searchValue = $('#searchInput').val().toLowerCase();
            const magValue = $('#magFilter').val();

            filteredData = allData.filter(d => {
                // Search filter
                const matchSearch = !searchValue ||
                    d.place.toLowerCase().includes(searchValue) ||
                    d.time.includes(searchValue) ||
                    d.mag.toString().includes(searchValue);

                // Magnitude filter
                let matchMag = true;
                if (magValue && d.mag !== '--') {
                    if (magValue === '0-3') matchMag = d.mag < 3;
                    else if (magValue === '3-5') matchMag = d.mag >= 3 && d.mag < 5;
                    else if (magValue === '5-7') matchMag = d.mag >= 5 && d.mag < 7;
                    else if (magValue === '7+') matchMag = d.mag >= 7;
                }

                return matchSearch && matchMag;
            });

            dataTable.clear().rows.add(filteredData).draw();
        }
    </script>
</body>
</html>
